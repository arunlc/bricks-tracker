<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bricks Delivery Tracker</title>
<style>
  :root{
    --bg:#f6f4ef; --card:#fff; --ink:#23211c; --muted:#6f6b61;
    --line:#e4e0d6; --accent:#a8451f; --accent-soft:#f4e7e1;
    --green:#2f6f4f; --green-soft:#e4f0e9; --danger:#9a2c1a;
    --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5}
  header{position:sticky;top:0;z-index:10;background:var(--bg);
    border-bottom:1px solid var(--line);padding:14px 16px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:18px;margin:0 0 10px;font-weight:600}
  h1 span{color:var(--accent)}
  .search{position:relative}
  .search input{width:100%;height:46px;padding:0 14px;font-size:16px;
    border:1px solid var(--line);border-radius:var(--radius);background:var(--card);outline:none}
  .search input:focus{border-color:var(--accent)}
  .results{position:absolute;top:52px;left:0;right:0;background:var(--card);
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    box-shadow:0 8px 28px rgba(0,0,0,.08);display:none}
  .results.show{display:block}
  .results div{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center}
  .results div:last-child{border-bottom:none}
  .results div:hover{background:var(--accent-soft)}
  .results small{color:var(--muted)}
  main{max-width:760px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:14px}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .name{font-size:20px;font-weight:600;margin:0}
  .phone{color:var(--muted);font-size:14px;margin:2px 0 0}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .stat{background:var(--bg);border-radius:10px;padding:10px 12px}
  .stat label{display:block;font-size:12px;color:var(--muted)}
  .stat b{font-size:18px;font-weight:600}
  .stat.pend b{color:var(--accent)}
  .stat.pend.clear b{color:var(--green)}
  .pill{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:600}
  .pill.paid{background:var(--green-soft);color:var(--green)}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .item{border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:10px}
  .item.void{opacity:.6;background:repeating-linear-gradient(45deg,#faf7f2,#faf7f2 8px,#f1ece4 8px,#f1ece4 16px)}
  .item .top{display:flex;justify-content:space-between;align-items:center}
  .item .date{font-weight:600}
  .item .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 16px;
    margin-top:8px;font-size:14px}
  .item .grid span{color:var(--muted)}
  .item .note{margin-top:8px;font-size:13px;color:var(--muted);font-style:italic}
  .item .ops{display:flex;gap:8px;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
  .amt{font-weight:600}
  .amt.pay{color:var(--green)}
  .voidtag{font-size:11px;font-weight:600;color:var(--danger);background:#f7e3df;
    padding:2px 8px;border-radius:20px;margin-left:8px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;
    font-size:15px;font-weight:600;padding:11px 16px}
  .btn-primary{background:var(--accent);color:#fff;width:100%}
  .btn-pay{background:var(--green);color:#fff;width:100%}
  .btn-primary:active,.btn-pay:active{transform:scale(.99)}
  .btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--line);padding:8px 12px;font-size:14px}
  .btn-wa{background:#25852f;color:#fff;font-size:13px;padding:7px 12px;text-decoration:none;border-radius:10px}
  .op{font-size:13px;padding:6px 12px;border:1px solid var(--line);background:var(--bg);color:var(--ink)}
  .op.void{color:var(--danger)}
  .op.restore{color:var(--green)}
  .btn-danger{background:var(--danger);color:#fff;width:100%}
  .btn-danger:disabled{background:#d8c2bd;cursor:not-allowed}
  .tabs{display:flex;gap:8px;margin-top:6px}
  .tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:14px;font-weight:600;
    cursor:pointer;color:var(--muted);background:var(--bg)}
  .tab.on{background:var(--accent-soft);color:var(--accent)}
  .voidtoggle{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;
    color:var(--muted);cursor:pointer;user-select:none}
  label.fld{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px}
  input.in,select.in,textarea.in{width:100%;padding:10px 12px;font-size:15px;
    border:1px solid var(--line);border-radius:10px;background:var(--card);outline:none;font-family:inherit}
  input.in:focus,select.in:focus,textarea.in:focus{border-color:var(--accent)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .muted{color:var(--muted);font-size:14px}
  .empty{text-align:center;color:var(--muted);padding:30px 16px}
  .computed{background:var(--accent-soft);border-radius:10px;padding:10px 12px;margin-top:12px;
    display:flex;justify-content:space-between;font-size:14px;font-weight:600;color:var(--accent)}
  .quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .quick button{background:var(--bg);color:var(--ink);border:1px solid var(--line);
    padding:7px 12px;font-size:14px;font-weight:500}
  .warnbox{background:#fbeee9;border:1px solid #e7cabf;border-radius:10px;padding:12px;
    font-size:14px;color:var(--danger);margin:10px 0}
  dialog{border:none;border-radius:var(--radius);padding:18px;max-width:440px;width:92%;
    box-shadow:0 16px 50px rgba(0,0,0,.25)}
  dialog::backdrop{background:rgba(0,0,0,.35)}
  .dlg-title{font-size:17px;font-weight:600;margin:0 0 4px}
  .x{position:absolute;top:14px;right:16px;background:transparent;color:var(--muted);font-size:22px;padding:0;width:30px}
  .banner{background:#fff5f0;border:1px solid #f0d0c0;color:#8a3a18;padding:12px 14px;
    border-radius:10px;font-size:13px;margin:16px auto;max-width:760px}
  .dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .dash-head h2{font-size:16px;margin:0;font-weight:600}
  .hero{background:var(--accent);color:#fff;border-radius:var(--radius);padding:18px;margin-bottom:14px}
  .hero label{font-size:13px;opacity:.85;display:block}
  .hero b{font-size:30px;font-weight:700;display:block;margin-top:2px}
  .hero .sub{font-size:13px;opacity:.85;margin-top:6px}
  .owe{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;
    border-bottom:1px solid var(--line);cursor:pointer}
  .owe:last-child{border-bottom:none}
  .owe:hover{background:var(--accent-soft);border-radius:8px;padding-left:8px;padding-right:8px}
  .owe .who{font-weight:600}
  .owe .meta{font-size:12px;color:var(--muted)}
  .owe .due{font-weight:600;color:var(--accent);white-space:nowrap}
  .rank{display:inline-block;width:22px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>🧱 Bricks <span>Tracker</span></h1>
    <div class="search">
      <input id="searchBox" placeholder="Search customer by name…" autocomplete="off">
      <div class="results" id="results"></div>
    </div>
  </div>
</header>

<div id="cfgBanner" class="banner" style="display:none"></div>

<main id="main">
  <div id="home"><div class="empty">Loading dashboard…</div></div>
</main>

<dialog id="custDlg">
  <button class="x" onclick="custDlg.close()">&times;</button>
  <p class="dlg-title">New customer</p>
  <label class="fld">Name</label>
  <input class="in" id="ncName" placeholder="Ramesh Kumar">
  <label class="fld">Phone (with country code, e.g. 919876543210)</label>
  <input class="in" id="ncPhone" placeholder="919876543210" inputmode="numeric">
  <label class="fld">Notes (optional)</label>
  <input class="in" id="ncNotes" placeholder="Site address, preferences…">
  <div style="margin-top:16px"><button class="btn-primary" onclick="saveCustomer()">Save customer</button></div>
</dialog>

<dialog id="delvDlg">
  <button class="x" onclick="delvDlg.close()">&times;</button>
  <p class="dlg-title" id="delvTitle">Add delivery</p>
  <p class="muted" id="delvFor"></p>
  <div class="two">
    <div><label class="fld">Date</label><input class="in" type="date" id="dDate"></div>
    <div><label class="fld">No. of bricks</label><input class="in" type="number" id="dBricks" inputmode="numeric" oninput="recalcDelv()"></div>
  </div>
  <label class="fld">Price per brick</label>
  <input class="in" type="number" id="dPrice" step="0.01" inputmode="decimal" oninput="recalcDelv()">
  <label class="fld">Notes (optional)</label>
  <textarea class="in" id="dNotes" rows="2" placeholder="Delivery notes…"></textarea>
  <div class="computed"><span>Order value</span><span>₹<b id="dTotal">0</b></span></div>
  <div style="margin-top:14px"><button class="btn-primary" id="delvSave" onclick="saveDelivery()">Save delivery</button></div>
</dialog>

<dialog id="payDlg">
  <button class="x" onclick="payDlg.close()">&times;</button>
  <p class="dlg-title" id="payTitle">Record payment</p>
  <p class="muted" id="payFor"></p>
  <div class="two">
    <div><label class="fld">Date</label><input class="in" type="date" id="pDate"></div>
    <div><label class="fld">Amount received</label><input class="in" type="number" id="pAmount" step="0.01" inputmode="decimal"></div>
  </div>
  <div class="quick" id="payQuick"></div>
  <label class="fld">Method</label>
  <select class="in" id="pMethod">
    <option>UPI</option><option>Cash</option><option>Net Banking</option>
    <option>Cheque</option><option>Card</option><option>Other</option>
  </select>
  <label class="fld">Notes (optional)</label>
  <textarea class="in" id="pNotes" rows="2" placeholder="Reference no., remarks…"></textarea>
  <div style="margin-top:14px"><button class="btn-pay" id="paySave" onclick="savePayment()">Save payment</button></div>
</dialog>

<dialog id="voidDlg">
  <button class="x" onclick="voidDlg.close()">&times;</button>
  <p class="dlg-title">Void this entry?</p>
  <p class="muted" id="voidWhat"></p>
  <div class="warnbox" id="voidWarn"></div>
  <p class="muted">Voiding hides this from balances and the customer's list. It is not deleted — you can restore it later from “Show voided”.</p>
  <label class="fld">Type <b>VOID</b> to confirm</label>
  <input class="in" id="voidConfirm" placeholder="VOID" autocomplete="off" oninput="checkVoid()">
  <div style="margin-top:14px"><button class="btn-danger" id="voidBtn" disabled onclick="doVoid()">Void entry</button></div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
let sb=null, currentCustomer=null, currentTab='deliveries', showVoided=false;
let cache={deliveries:[],payments:[],pending:0};
let editing=null;     // {type:'delivery'|'payment', id} when editing, else null
let voidTarget=null;  // {type, id, label} when void dialog open
const $=id=>document.getElementById(id);
const fmt=n=>Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2});
const esc=s=>String(s).replace(/'/g,"\\'");

function initDB(){
  if(!window.BRICKS_CONFIG || window.BRICKS_CONFIG.url.includes('YOUR_')){
    $('cfgBanner').style.display='block';
    $('cfgBanner').innerHTML='⚠️ Not connected yet. Open <b>config.js</b> and paste your Supabase URL and anon key. See the setup guide.';
    return false;
  }
  sb=supabase.createClient(window.BRICKS_CONFIG.url, window.BRICKS_CONFIG.anonKey);
  return true;
}

let searchTimer;
$('searchBox').addEventListener('input', e=>{
  clearTimeout(searchTimer);
  const q=e.target.value.trim();
  if(!q){ $('results').classList.remove('show'); return; }
  searchTimer=setTimeout(()=>runSearch(q),200);
});
async function runSearch(q){
  if(!sb) return;
  const {data}=await sb.from('customers').select('*').ilike('name',`%${q}%`).order('name').limit(8);
  const box=$('results');
  if(!data||!data.length){
    box.innerHTML=`<div onclick="openNewCustomer()"><span>No match — <b>add “${q}”</b></span><small>+ new</small></div>`;
    box.classList.add('show'); return;
  }
  box.innerHTML=data.map(c=>
    `<div onclick='viewCustomer(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
       <span><b>${c.name}</b></span><small>${c.phone}</small></div>`).join('');
  box.classList.add('show');
}
document.addEventListener('click',e=>{ if(!e.target.closest('.search')) $('results').classList.remove('show'); });

async function viewCustomer(c){
  currentCustomer=c;
  $('results').classList.remove('show');
  $('searchBox').value='';
  const [{data:dels},{data:pays}]=await Promise.all([
    sb.from('deliveries').select('*').eq('customer_id',c.id).order('delivery_date',{ascending:false}),
    sb.from('payments').select('*').eq('customer_id',c.id).order('payment_date',{ascending:false})
  ]);
  cache.deliveries=dels||[]; cache.payments=pays||[];
  render();
}

function activeSum(rows,key){ return rows.filter(r=>!r.voided_at).reduce((s,r)=>s+Number(r[key]),0); }

function render(){
  const c=currentCustomer;
  const billed=activeSum(cache.deliveries,'total_value');
  const paid=activeSum(cache.payments,'amount');
  cache.pending=billed-paid;
  const pending=cache.pending, clear=pending<=0;
  const waMsg=encodeURIComponent(`Hello ${c.name}, a gentle reminder that ₹${fmt(pending)} is pending for your bricks order. Thank you!`);
  const waLink=`https://wa.me/${c.phone}?text=${waMsg}`;
  const dCount=cache.deliveries.filter(d=>!d.voided_at).length;
  const pCount=cache.payments.filter(p=>!p.voided_at).length;
  $('main').innerHTML=`
    <div style="margin-bottom:10px"><button class="btn-ghost" onclick="showHome()">← Dashboard</button></div>
    <div class="card">
      <div class="row">
        <div><p class="name">${c.name}</p><p class="phone">${c.phone}</p></div>
        ${pending>0
          ? `<a class="btn-wa" href="${waLink}" target="_blank">WhatsApp reminder</a>`
          : `<span class="pill paid">All settled</span>`}
      </div>
      ${c.notes?`<p class="muted" style="margin-top:8px">${c.notes}</p>`:''}
      <div class="stats">
        <div class="stat"><label>Total billed</label><b>₹${fmt(billed)}</b></div>
        <div class="stat"><label>Total paid</label><b>₹${fmt(paid)}</b></div>
        <div class="stat pend ${clear?'clear':''}"><label>${clear?'Balance':'Pending'}</label><b>₹${fmt(Math.abs(pending))}${pending<0?' adv':''}</b></div>
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="openDelivery()">+ Add delivery</button>
        <button class="btn-pay" onclick="openPayment()">+ Record payment</button>
      </div>
    </div>
    <div class="card">
      <div class="tabs">
        <div class="tab ${currentTab==='deliveries'?'on':''}" onclick="switchTab('deliveries')">Deliveries (${dCount})</div>
        <div class="tab ${currentTab==='payments'?'on':''}" onclick="switchTab('payments')">Payments (${pCount})</div>
      </div>
      <div id="list"></div>
      <label class="voidtoggle"><input type="checkbox" ${showVoided?'checked':''} onchange="toggleVoided(this.checked)"> Show voided entries</label>
    </div>`;
  renderList();
}
function switchTab(t){ currentTab=t; render(); }
function toggleVoided(v){ showVoided=v; render(); }

function renderList(){
  const el=$('list');
  const rows = (currentTab==='deliveries'?cache.deliveries:cache.payments)
                 .filter(r=>showVoided || !r.voided_at);
  if(!rows.length){ el.innerHTML=`<p class="empty">No ${currentTab} ${showVoided?'':'yet'}.</p>`; return; }
  el.innerHTML = rows.map(currentTab==='deliveries'?deliveryItem:paymentItem).join('');
}
function opsRow(type,r){
  if(r.voided_at){
    return `<div class="ops"><button class="op restore" onclick="restore('${type}','${r.id}')">Restore</button>
      <span class="muted" style="align-self:center">Voided ${new Date(r.voided_at).toLocaleDateString('en-IN')}</span></div>`;
  }
  return `<div class="ops">
    <button class="op" onclick="${type==='delivery'?'editDelivery':'editPayment'}('${r.id}')">Edit</button>
    <button class="op void" onclick="askVoid('${type}','${r.id}')">Void</button></div>`;
}
function deliveryItem(d){
  return `<div class="item ${d.voided_at?'void':''}">
    <div class="top">
      <span class="date">${d.delivery_date}${d.voided_at?'<span class="voidtag">VOIDED</span>':''}</span>
      <span class="amt">₹${fmt(d.total_value)}</span>
    </div>
    <div class="grid"><div><span>Bricks:</span> ${fmt(d.bricks)}</div>
      <div><span>Per brick:</span> ₹${fmt(d.price_per_brick)}</div></div>
    ${d.notes?`<div class="note">${d.notes}</div>`:''}
    ${opsRow('delivery',d)}</div>`;
}
function paymentItem(p){
  return `<div class="item ${p.voided_at?'void':''}">
    <div class="top">
      <span class="date">${p.payment_date}${p.voided_at?'<span class="voidtag">VOIDED</span>':''}</span>
      <span class="amt pay">+ ₹${fmt(p.amount)}</span>
    </div>
    <div class="grid"><div><span>Method:</span> ${p.method||'—'}</div></div>
    ${p.notes?`<div class="note">${p.notes}</div>`:''}
    ${opsRow('payment',p)}</div>`;
}

function openNewCustomer(){
  const typed=$('searchBox').value.trim();
  $('ncName').value=typed||''; $('ncPhone').value=''; $('ncNotes').value='';
  $('results').classList.remove('show'); custDlg.showModal();
}
async function saveCustomer(){
  const name=$('ncName').value.trim(), phone=$('ncPhone').value.trim().replace(/\D/g,'');
  if(!name||!phone){ alert('Name and phone are required'); return; }
  const {data,error}=await sb.from('customers').insert({name,phone,notes:$('ncNotes').value.trim()||null}).select().single();
  if(error){ alert(error.message); return; }
  custDlg.close(); viewCustomer(data);
}

// ---- Delivery: add + edit share one dialog ----
function openDelivery(){
  editing=null;
  $('delvTitle').textContent='Add delivery';
  $('delvSave').textContent='Save delivery';
  $('delvFor').textContent='for '+currentCustomer.name;
  $('dDate').value=new Date().toISOString().slice(0,10);
  ['dBricks','dPrice','dNotes'].forEach(id=>$(id).value=''); recalcDelv(); delvDlg.showModal();
}
function editDelivery(id){
  const d=cache.deliveries.find(x=>x.id===id); if(!d) return;
  editing={type:'delivery',id};
  $('delvTitle').textContent='Edit delivery';
  $('delvSave').textContent='Update delivery';
  $('delvFor').textContent='for '+currentCustomer.name;
  $('dDate').value=d.delivery_date; $('dBricks').value=d.bricks;
  $('dPrice').value=d.price_per_brick; $('dNotes').value=d.notes||'';
  recalcDelv(); delvDlg.showModal();
}
function recalcDelv(){
  const total=(Number($('dBricks').value)||0)*(Number($('dPrice').value)||0);
  $('dTotal').textContent=fmt(total);
}
async function saveDelivery(){
  const bricks=Number($('dBricks').value)||0, price=Number($('dPrice').value)||0, total=bricks*price;
  if(total<=0){ alert('Enter bricks and price'); return; }
  const payload={delivery_date:$('dDate').value, bricks, price_per_brick:price,
    total_value:total, notes:$('dNotes').value.trim()||null};
  let error;
  if(editing&&editing.type==='delivery'){
    ({error}=await sb.from('deliveries').update(payload).eq('id',editing.id));
  } else {
    ({error}=await sb.from('deliveries').insert({customer_id:currentCustomer.id,...payload}));
  }
  if(error){ alert(error.message); return; }
  delvDlg.close(); currentTab='deliveries'; editing=null; viewCustomer(currentCustomer);
}

// ---- Payment: add + edit share one dialog ----
function openPayment(){
  editing=null;
  $('payTitle').textContent='Record payment';
  $('paySave').textContent='Save payment';
  $('payFor').textContent=`for ${currentCustomer.name} · ₹${fmt(cache.pending)} pending`;
  $('pDate').value=new Date().toISOString().slice(0,10);
  ['pAmount','pNotes'].forEach(id=>$(id).value=''); $('pMethod').value='UPI';
  buildQuick(cache.pending); payDlg.showModal();
}
function editPayment(id){
  const p=cache.payments.find(x=>x.id===id); if(!p) return;
  editing={type:'payment',id};
  $('payTitle').textContent='Edit payment';
  $('paySave').textContent='Update payment';
  $('payFor').textContent='for '+currentCustomer.name;
  $('pDate').value=p.payment_date; $('pAmount').value=p.amount;
  $('pMethod').value=p.method||'UPI'; $('pNotes').value=p.notes||'';
  buildQuick(cache.pending); payDlg.showModal();
}
function buildQuick(pend){
  const q=$('payQuick');
  q.innerHTML = pend>0
    ? `<button onclick="$('pAmount').value=${pend}">Full ₹${fmt(pend)}</button>`+
      [0.25,0.5].map(f=>`<button onclick="$('pAmount').value=${Math.round(pend*f)}">₹${fmt(Math.round(pend*f))}</button>`).join('')
    : '';
}
async function savePayment(){
  const amount=Number($('pAmount').value)||0;
  if(amount<=0){ alert('Enter an amount'); return; }
  const payload={payment_date:$('pDate').value, amount, method:$('pMethod').value, notes:$('pNotes').value.trim()||null};
  let error;
  if(editing&&editing.type==='payment'){
    ({error}=await sb.from('payments').update(payload).eq('id',editing.id));
  } else {
    ({error}=await sb.from('payments').insert({customer_id:currentCustomer.id,...payload}));
  }
  if(error){ alert(error.message); return; }
  payDlg.close(); currentTab='payments'; editing=null; viewCustomer(currentCustomer);
}

// ---- Void (soft delete) with type-to-confirm ----
function askVoid(type,id){
  const r=(type==='delivery'?cache.deliveries:cache.payments).find(x=>x.id===id);
  if(!r) return;
  const label = type==='delivery'
    ? `Delivery of ${fmt(r.bricks)} bricks · ₹${fmt(r.total_value)} · ${r.delivery_date}`
    : `Payment of ₹${fmt(r.amount)} (${r.method||'—'}) · ${r.payment_date}`;
  voidTarget={type,id,label};
  $('voidWhat').textContent=label;
  $('voidWarn').textContent = type==='delivery'
    ? 'This delivery will stop counting toward the amount billed.'
    : 'This payment will stop counting — the customer’s pending balance will go UP by this amount.';
  $('voidConfirm').value=''; $('voidBtn').disabled=true;
  voidDlg.showModal();
}
function checkVoid(){ $('voidBtn').disabled = $('voidConfirm').value.trim().toUpperCase()!=='VOID'; }
async function doVoid(){
  if(!voidTarget) return;
  const table = voidTarget.type==='delivery'?'deliveries':'payments';
  const {error}=await sb.from(table).update({voided_at:new Date().toISOString()}).eq('id',voidTarget.id);
  if(error){ alert(error.message); return; }
  voidDlg.close(); voidTarget=null; viewCustomer(currentCustomer);
}
async function restore(type,id){
  const table = type==='delivery'?'deliveries':'payments';
  const {error}=await sb.from(table).update({voided_at:null}).eq('id',id);
  if(error){ alert(error.message); return; }
  viewCustomer(currentCustomer);
}

async function showHome(){
  currentCustomer=null;
  if(!sb){ $('main').innerHTML=''; return; }
  $('main').innerHTML='<div class="empty">Loading dashboard…</div>';
  const {data,error}=await sb.from('customer_balance').select('*');
  if(error){ $('main').innerHTML=`<div class="card">Couldn't load dashboard: ${error.message}</div>`; return; }
  const owing=(data||[]).filter(r=>Number(r.pending)>0).sort((a,b)=>b.pending-a.pending);
  const totalOut=owing.reduce((s,r)=>s+Number(r.pending),0);
  const customerCount=(data||[]).length;
  const list = owing.length
    ? owing.map((r,i)=>`
        <div class="owe" onclick='openById("${r.customer_id}")'>
          <div><span class="rank">${i+1}.</span><span class="who">${r.name}</span>
            <div class="meta" style="margin-left:22px">${r.phone}${r.last_delivery?` · last ${r.last_delivery}`:''}</div></div>
          <span class="due">₹${fmt(r.pending)}</span>
        </div>`).join('')
    : '<div class="empty">Everyone is settled up. 🎉</div>';
  $('main').innerHTML=`
    <div class="hero">
      <label>Total outstanding</label>
      <b>₹${fmt(totalOut)}</b>
      <div class="sub">${owing.length} customer(s) owe money · ${customerCount} total</div>
    </div>
    <div class="card">
      <div class="dash-head"><h2>Who owes the most</h2>
        <button class="btn-ghost" onclick="openNewCustomer()">+ New</button></div>
      ${list}
    </div>`;
}
async function openById(id){
  const {data}=await sb.from('customers').select('*').eq('id',id).single();
  if(data) viewCustomer(data);
}

initDB();
showHome();
</script>
